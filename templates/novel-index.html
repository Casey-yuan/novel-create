<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <base href="{{basePath}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="./index.html" class="back-link">返回首页</a>
      <button class="theme-toggle" aria-label="切换主题">🌙</button>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="novel-detail-header">
        <h2>{{novelName}}</h2>
        <p class="novel-meta">{{totalVolumes}} 卷 · {{totalChapters}} 章</p>
      </div>

      <div class="volumes-container">
        {{volumes}}
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 小说阅读</p>
    </div>
  </footer>

  <script src="./assets/js/theme.js"></script>
  <script src="./assets/js/reading-progress.js"></script>
</body>
</html>
