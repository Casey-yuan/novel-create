<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <base href="{{basePath}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{novelLink}}" class="back-link">返回目录</a>
      <button class="theme-toggle" aria-label="切换主题">🌙</button>
    </div>
  </header>

  <div class="reading-layout">
    <aside class="toc-sidebar">
      <div class="toc-title">目录</div>
      <ul class="toc-list">
        {{toc}}
      </ul>
    </aside>

    <main class="chapter-reading">
      <nav class="breadcrumb">
        <a href="./index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="{{novelLink}}">{{novelName}}</a>
        <span class="breadcrumb-separator">/</span>
        <span>{{volumeName}}</span>
      </nav>

      <h1 class="chapter-header-title">第{{chapterNumber}}章 {{chapterTitle}}</h1>

      <article class="chapter-body">
        {{content}}
      </article>

      <nav class="chapter-nav">
        {{prevLink}}
        {{nextLink}}
      </nav>
    </main>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 小说阅读</p>
    </div>
  </footer>

  <script src="./assets/js/theme.js"></script>
</body>
</html>
